<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>航管 697 題刷題系統</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>航管 697 題刷題系統</h1>
        <p id="subtitle">順序刷題｜隨機刷題｜範圍練習｜模擬考｜錯題本</p>
      </div>
      <button id="resetAllBtn" class="ghost small">清除紀錄</button>
    </header>

    <section class="card setup" id="setup">
      <h2>選擇模式</h2>
      <div class="mode-grid">
        <button class="mode active" data-mode="sequential">順序刷題</button>
        <button class="mode" data-mode="random">隨機刷題</button>
        <button class="mode" data-mode="range">範圍練習</button>
        <button class="mode" data-mode="mock">模擬考</button>
        <button class="mode" data-mode="wrong">錯題本</button>
      </div>

      <div class="form">
        <label>起始題號
          <input type="number" id="startNo" value="1" min="1" max="697">
        </label>
        <label>結束題號
          <input type="number" id="endNo" value="697" min="1" max="697">
        </label>
        <label>模擬考題數
          <input type="number" id="mockCount" value="50" min="1" max="697">
        </label>
        <label>考試倒數（分鐘）
          <input type="number" id="minutes" value="30" min="1" max="300">
        </label>
      </div>

      <div class="actions">
        <button id="startBtn" class="primary">開始刷題</button>
        <button id="exportBtn" class="ghost">匯出成績</button>
      </div>
      <p class="hint">目前只有答案表版本：題目會顯示為「第 N 題」。之後你把題目文字給我，也能直接升級成「題目＋答案」完整版。</p>
    </section>

    <section class="stats card">
      <div><strong id="totalDone">0</strong><span>作答</span></div>
      <div><strong id="accuracy">0%</strong><span>正確率</span></div>
      <div><strong id="wrongCount">0</strong><span>錯題</span></div>
      <div><strong id="timer">--:--</strong><span>倒數</span></div>
    </section>

    <section class="card quiz hidden" id="quiz">
      <div class="topline">
        <span id="progress">第 1 / 697 題</span>
        <span id="modeName">順序刷題</span>
      </div>
      <div class="bar"><div id="barFill"></div></div>
      <h2 id="questionTitle">第 1 題</h2>
      <p id="questionText">請選擇答案</p>

      <div class="choices" id="choices"></div>
      <div id="feedback" class="feedback"></div>

      <div class="nav">
        <button id="prevBtn" class="ghost">上一題</button>
        <button id="showBtn" class="ghost">看答案</button>
        <button id="nextBtn" class="primary">下一題</button>
      </div>
    </section>

    <section class="card result hidden" id="result">
      <h2>本次成績</h2>
      <div class="result-score" id="resultScore">0 / 0</div>
      <p id="resultText"></p>
      <div class="actions">
        <button id="reviewWrongBtn" class="primary">複習錯題</button>
        <button id="backHomeBtn" class="ghost">回首頁</button>
      </div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
